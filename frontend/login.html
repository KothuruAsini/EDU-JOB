<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Edu2Job</title>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #3a7bd5, #3a6073);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 35px;
      width: 360px;
      color: white;
      text-align: center;
      box-shadow: 0 6px 25px rgba(0,0,0,0.3);
    }

    h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .input-group {
      position: relative;
      margin: 14px 0;
      width: 100%;
    }

    .input-group input {
      width: 100%;
      padding: 10px 38px 10px 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.95);
      font-size: 14px;
      box-sizing: border-box;
    }

    .input-group span {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.7;
      pointer-events: none;
    }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(45deg, #43cea2, #185a9d);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 5px;
    }

    button:hover {
      transform: translateY(-2px);
      background: linear-gradient(45deg, #185a9d, #43cea2);
    }

    a {
      color: #fff;
      text-decoration: underline;
      font-weight: 600;
    }

    .error {
      color: #ffbaba;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
         width="70" alt="login">

    <h2>Welcome Back</h2>
    <p>Login to continue your journey</p>

    <form id="loginForm">

      <div class="input-group">
        <input id="username" type="text" placeholder="Username" required>
        <span>👤</span>
      </div>

      <div class="input-group">
        <input id="password" type="password" placeholder="Password" required>
        <span>🔒</span>
      </div>

      <button type="submit">Login</button>

      <div class="error" id="errorMsg"></div>
    </form>

    <p style="margin-top:15px;">Don't have an account?
      <a href="register.html">Register</a>
    </p>
  </div>

  <script>
    const API = "http://127.0.0.1:8000/api/";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("errorMsg");

      if (!username || !password)
        return msg.innerText = "⚠️ Both fields required.";

      try {
        const res = await fetch(API + "login/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && (data.access || data.token)) {

          // clear stale auth keys from older versions before storing the new token
          localStorage.removeItem("access");
          localStorage.removeItem("access_token");
          localStorage.removeItem("token");
          localStorage.removeItem("refresh");

          // store possible token keys for compatibility across pages
          const accessToken = data.access || data.token;
          if (accessToken) {
            localStorage.setItem("access", accessToken);
            localStorage.setItem("access_token", accessToken);
            localStorage.setItem("token", accessToken);
          }

          if (data.refresh) localStorage.setItem("refresh", data.refresh);

          localStorage.setItem("user_name", username);

          window.location.href = "dashboard.html";
        }
        else {
          msg.innerText = data.detail || "⚠️ Invalid username or password.";
        }

      } catch {
        msg.innerText = "⚠️ Server not reachable.";
      }
    });
  </script>

</body>
</html>
